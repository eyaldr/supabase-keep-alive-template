name: Supabase Keep-Alive

# ─────────────────────────────────────────────────────
# לפני הפעלה — מלא את כל ה-secrets ב-GitHub:
#   Settings → Secrets and variables → Actions
# ראה את הרשימה המלאה ב-secrets.template.txt
# ─────────────────────────────────────────────────────

on:
  # הסירו את ה-# משתי השורות הבאות לאחר הגדרת ה-secrets (ראו שלב 5):
  # schedule:
  #   - cron: "0 8 * * 1,3" # ב' + ד' ב-08:00 UTC (11:00 ישראל)
  workflow_dispatch: # הרצה ידנית מ-GitHub UI לבדיקה

jobs:
  ping:
    name: Ping all Supabase projects
    runs-on: ubuntu-latest
    steps:

      # ── פרויקט 1 ──────────────────────────────────
      # שנה את שם ה-step ואת שמות ה-secrets לשם הפרויקט שלך
      # דרישה מוקדמת: הרץ את ה-SQL מ-README שלב 3 ב-Supabase SQL Editor
      - name: Ping Project-1            # <-- שנה לשם הפרויקט
        id: p1
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.PROJECT_1_URL }}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${{ secrets.PROJECT_1_K }}" \
            -H "Authorization: Bearer ${{ secrets.PROJECT_1_K }}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          [ "$STATUS" = "200" ] || exit 1

      # ── פרויקט 2 ──────────────────────────────────
      - name: Ping Project-2            # <-- שנה לשם הפרויקט
        id: p2
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.PROJECT_2_URL }}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${{ secrets.PROJECT_2_K }}" \
            -H "Authorization: Bearer ${{ secrets.PROJECT_2_K }}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          [ "$STATUS" = "200" ] || exit 1

      # ── פרויקט 3 (אופציונלי) ──────────────────────
      # אם יש לך רק 2 פרויקטים — מחק את ה-step הזה
      # ואת השורות המתאימות ב-Write job summary, Send email report, ו-Fail if any project is down
      - name: Ping Project-3            # <-- שנה לשם הפרויקט
        id: p3
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.PROJECT_3_URL }}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${{ secrets.PROJECT_3_K }}" \
            -H "Authorization: Bearer ${{ secrets.PROJECT_3_K }}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          [ "$STATUS" = "200" ] || exit 1

      # ── פרויקט 4 (אופציונלי) ──────────────────────
      - name: Ping Project-4            # <-- שנה לשם הפרויקט
        id: p4
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.PROJECT_4_URL }}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${{ secrets.PROJECT_4_K }}" \
            -H "Authorization: Bearer ${{ secrets.PROJECT_4_K }}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          [ "$STATUS" = "200" ] || exit 1

      # ── סיכום בדף ה-Actions ───────────────────────
      - name: Write job summary
        if: always()
        run: |
          R1="${{ steps.p1.outcome == 'success' && '✅ Alive' || '❌ Failed' }}"
          R2="${{ steps.p2.outcome == 'success' && '✅ Alive' || '❌ Failed' }}"
          R3="${{ steps.p3.outcome == 'success' && '✅ Alive' || '❌ Failed' }}"
          R4="${{ steps.p4.outcome == 'success' && '✅ Alive' || '❌ Failed' }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Supabase Keep-Alive Report
          **Run time:** $(date -u '+%Y-%m-%d %H:%M UTC')

          | Project   | Status | HTTP |
          |-----------|--------|------|
          | Project-1 | $R1 | ${{ steps.p1.outputs.status }} |
          | Project-2 | $R2 | ${{ steps.p2.outputs.status }} |
          | Project-3 | $R3 | ${{ steps.p3.outputs.status }} |
          | Project-4 | $R4 | ${{ steps.p4.outputs.status }} |
          EOF

      # ── דוח במייל ─────────────────────────────────
      # להשבתה: מחק את כל ה-step הזה
      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: Supabase Keep-Alive
          subject: >
            ${{ (steps.p1.outcome == 'failure' || steps.p2.outcome == 'failure' ||
                 steps.p3.outcome == 'failure' || steps.p4.outcome == 'failure')
                && 'Supabase Keep-Alive - FAILED' || 'Supabase Keep-Alive - All OK' }}
          body: |
            Supabase Keep-Alive Report
            Run time: ${{ github.event.head_commit.timestamp || 'manual trigger' }}

            Project-1: ${{ steps.p1.outcome == 'success' && 'Alive (200)' || 'FAILED' }}
            Project-2: ${{ steps.p2.outcome == 'success' && 'Alive (200)' || 'FAILED' }}
            Project-3: ${{ steps.p3.outcome == 'success' && 'Alive (200)' || 'FAILED' }}
            Project-4: ${{ steps.p4.outcome == 'success' && 'Alive (200)' || 'FAILED' }}

            Full report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── כשל כללי אם אחד הפרויקטים נפל ───────────
      - name: Fail if any project is down
        if: |
          steps.p1.outcome == 'failure' ||
          steps.p2.outcome == 'failure' ||
          steps.p3.outcome == 'failure' ||
          steps.p4.outcome == 'failure'
        run: |
          echo "One or more Supabase projects failed the health check"
          exit 1
